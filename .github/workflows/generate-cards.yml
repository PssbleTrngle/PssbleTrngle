name: Update README cards

on:
   schedule:
      - cron: "0 3 * * *"
   workflow_dispatch:

jobs:
   build:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - name: generate stats card
           uses: readme-tools/github-readme-stats-action@v1
           with:
              card: stats
              options: username=${{ github.repository_owner }}&theme=react&hide_border=true&show_icons=true
              path: profile/stats.svg
              token: ${{ secrets.GITHUB_TOKEN }}

         - name: generate top langs card
           uses: readme-tools/github-readme-stats-action@v1
           with:
              card: top-langs
              options: username=${{ github.repository_owner }}&theme=react&hide_border=true&layout=compact&langs_count=8&hide=TSQL,Dockerfile&card_width=440
              path: profile/top-langs.svg
              token: ${{ secrets.GITHUB_TOKEN }}

         - name: Commit cards
           run: |
              git config user.name "github-actions"
              git config user.email "github-actions@users.noreply.github.com"
              git add profile/*.svg
              git commit -m "Update README cards" || exit 0
              git push
